<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books - Syed Ejaz Digital Library</title>
  <meta name="description" content="Browse the digital book archive of Syed Ejaz Gillani">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light');}</script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
  <div id="nav-container"></div>
<main class="pt-24 pb-16">
  <!-- Hero Search Section -->
  <section class="max-w-7xl mx-auto px-8 mb-16">
    <div class="relative overflow-hidden rounded-xl p-12 bg-surface-container-low">
      <div class="relative z-10 max-w-2xl">
        <h1 class="font-headline text-5xl font-extrabold tracking-tight mb-6 text-on-surface">Explore Our Digital Archive</h1>
        <p class="text-primary text-lg mb-8 leading-relaxed">Access our curated collection of books by Syed Ejaz Gillani covering literature, history, religion and more.</p>
        <div class="flex items-center bg-surface-container-lowest rounded-full p-2 shadow-sm border border-outline-variant/10">
          <span class="material-symbols-outlined ml-4 text-outline">search</span>
          <input id="search-input" class="w-full border-none focus:ring-0 bg-transparent text-on-surface py-3 px-4 font-body" placeholder="Search by title, author, or category..." type="text">
          <button id="search-btn" class="gradient-cta text-white px-8 py-3 rounded-full font-semibold transition-all hover:scale-102 hover:opacity-95">Search</button>
        </div>
      </div>
      <div class="absolute right-0 top-0 w-1/3 h-full opacity-10 pointer-events-none">
        <span class="material-symbols-outlined text-[300px] absolute -right-20 -top-20">auto_stories</span>
      </div>
    </div>
  </section>
  <!-- Filters -->
  <section class="max-w-7xl mx-auto px-8 mb-8">
    <div id="category-filters" class="flex gap-3 overflow-x-auto pb-2 w-full">
      <!-- Dynamic category filter buttons -->
    </div>
  </section>
  <!-- Books Grid -->
  <section class="max-w-7xl mx-auto px-8">
    <div id="books-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      <!-- Dynamic book cards -->
      <div class="col-span-full text-center py-12 text-slate-400">Loading books...</div>
    </div>
  </section>
</main>
  <div id="footer-container"></div>
  <script src="assets/js/nav-footer.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/books.js"></script>
</body>
</html>
