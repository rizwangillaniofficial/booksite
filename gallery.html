<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Syed Ejaz Digital Library</title>
  <meta name="description" content="Photo gallery of events and moments from the Syed Ejaz Digital Library">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light');}</script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
  <div id="nav-container"></div>
<main class="pt-32 pb-20">
<!-- Hero Section -->
<section class="max-w-7xl mx-auto px-8 mb-16">
<div class="max-w-3xl">
<span id="dyn-gallery-tag" class="text-secondary font-label font-bold tracking-[0.05em] uppercase text-[0.75rem] mb-4 block">Our Visual Heritage</span>
<h1 id="dyn-gallery-title" class="text-5xl md:text-[3.5rem] font-headline font-extrabold tracking-tight text-primary leading-tight mb-6">
                    Gallery
                </h1>
<p id="dyn-gallery-sub" class="text-lg md:text-xl text-on-surface-variant font-body leading-relaxed">
                    A visual journey through our heritage and events. Exploring the depths of the Syed Ejaz Digital Library through curated artifacts and community moments.
                </p>
</div>
</section>
<!-- Category Filter -->
<section class="max-w-7xl mx-auto px-8 mb-12">
<div class="flex flex-wrap items-center gap-3">
<button data-filter="all" class="gallery-filter-btn px-6 py-2 rounded-full bg-primary text-white font-label font-semibold text-sm transition-all hover:scale-102">All</button>
<button data-filter="Events" class="gallery-filter-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface font-label font-semibold text-sm hover:bg-secondary hover:text-white transition-all">Events</button>
<button data-filter="Family" class="gallery-filter-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface font-label font-semibold text-sm hover:bg-secondary hover:text-white transition-all">Family</button>
<button data-filter="Travel" class="gallery-filter-btn px-6 py-2 rounded-full bg-surface-container-high text-on-surface font-label font-semibold text-sm hover:bg-secondary hover:text-white transition-all">Travel</button>
</div>
</section>
<!-- Gallery Grid -->
<section class="max-w-7xl mx-auto px-8">
<div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
  <!-- Dynamic gallery items will be loaded here -->
</div>
<!-- Load More Button -->
<div class="mt-20 flex justify-center">
<button class="group relative px-10 py-4 bg-gradient-to-r from-secondary to-tertiary text-white rounded-full font-headline font-bold text-sm transition-all duration-300 hover:scale-105 hover:shadow-lg overflow-hidden">
<span class="relative z-10">Load More Memories</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
</section>
</main>
  <div id="footer-container"></div>
  <script src="assets/js/nav-footer.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>
