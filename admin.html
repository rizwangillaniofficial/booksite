<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Syed Ejaz Digital Library</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: { secondary: "#006a6a", tertiary: "#0132c5" }, fontFamily: { headline: ["Manrope"], body: ["Inter"] } } }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Firebase SDKs (Compat versions for simpler setup) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
</head>
<body class="bg-gray-50 font-body text-slate-800 antialiased">

  <!-- Login Modal -->
  <div id="login-modal" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl max-w-sm w-full text-center">
      <span class="material-symbols-outlined text-5xl text-[#006a6a] mb-4">admin_panel_settings</span>
      <h2 class="font-headline text-2xl font-bold mb-2">Admin Access</h2>
      <p class="text-slate-500 text-sm mb-6">Please enter the admin password</p>
      <input type="password" id="admin-pwd" class="w-full px-4 py-3 border border-gray-200 rounded-lg mb-4 focus:ring-2 focus:ring-[#006a6a] outline-none" placeholder="Password">
      <button id="login-btn" class="w-full bg-[#006a6a] text-white py-3 rounded-lg font-bold hover:bg-[#004f4f] transition-all">Login</button>
      <p id="login-err" class="text-red-500 text-sm mt-3 hidden">Incorrect password</p>
    </div>
  </div>

  <!-- Admin Dashboard (Hidden initially) -->
  <div id="admin-dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
    
    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-white border-r border-gray-200 h-screen sticky top-0 flex flex-col">
      <div class="p-6 border-b border-gray-100 flex items-center gap-2">
        <span class="material-symbols-outlined text-[#006a6a]">auto_stories</span>
        <span class="font-headline font-bold text-lg">Library Admin</span>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <button onclick="switchTab('books')" class="w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg bg-gray-100 text-[#006a6a] font-medium tab-btn" data-tab="books">
          <span class="material-symbols-outlined">menu_book</span> Books
        </button>
        <button onclick="switchTab('categories')" class="w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-gray-50 hover:text-[#006a6a] font-medium tab-btn" data-tab="categories">
          <span class="material-symbols-outlined">category</span> Categories
        </button>
        <button onclick="switchTab('gallery')" class="w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-gray-50 hover:text-[#006a6a] font-medium tab-btn" data-tab="gallery">
          <span class="material-symbols-outlined">collections</span> Gallery
        </button>
        <div class="h-px bg-gray-200 my-2"></div>
        <button onclick="switchTab('pages')" class="w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-gray-50 hover:text-[#006a6a] font-medium tab-btn" data-tab="pages">
          <span class="material-symbols-outlined">article</span> Pages Content
        </button>
        <button onclick="switchTab('settings')" class="w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-gray-50 hover:text-[#006a6a] font-medium tab-btn" data-tab="settings">
          <span class="material-symbols-outlined">settings</span> Site Settings
        </button>
      </nav>
      <div class="p-4 border-t border-gray-100">
        <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 text-sm font-medium">
          <span class="material-symbols-outlined text-sm">open_in_new</span> View Live Site
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 md:p-12 overflow-y-auto">
      <div class="flex justify-between items-end mb-8">
        <div>
          <h1 id="tab-title" class="text-3xl font-headline font-bold text-slate-800">Manage Books</h1>
          <p class="text-slate-500 mt-1">Add, edit, or delete items from your database.</p>
        </div>
        <button id="add-new-btn" class="bg-[#006a6a] text-white px-5 py-2.5 rounded-lg font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">add</span> Add New
        </button>
      </div>

      <!-- Data Table Area -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-wider text-slate-500 font-bold">
                <th class="px-6 py-4">Item</th>
                <th class="px-6 py-4">Details</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table-body" class="divide-y divide-gray-100">
              <tr><td colspan="3" class="px-6 py-12 text-center text-slate-400">Loading data from Firebase...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal Form -->
  <div id="form-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
      <div class="px-8 py-5 border-b border-gray-100 flex justify-between items-center">
        <h3 id="form-title" class="font-headline font-bold text-xl">Add New</h3>
        <button id="close-modal" class="text-slate-400 hover:text-slate-800"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="p-8 overflow-y-auto">
        <form id="data-form" class="space-y-6">
          <!-- Form fields injected via JS based on tab -->
        </form>
      </div>
      <div class="px-8 py-5 border-t border-gray-100 bg-gray-50 rounded-b-2xl flex justify-end gap-3">
        <button id="cancel-btn" class="px-5 py-2.5 text-slate-600 font-medium hover:bg-gray-200 rounded-lg transition-colors">Cancel</button>
        <button id="save-btn" class="px-6 py-2.5 bg-[#006a6a] text-white font-medium rounded-lg hover:bg-[#004f4f] shadow-sm transition-all flex items-center gap-2">
          Save Item
        </button>
      </div>
    </div>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
