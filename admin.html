<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Syed Ejaz Digital Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1e293b;min-height:100vh}
    
    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)}
    .login-card{background:#fff;padding:48px;border-radius:16px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
    .login-card h2{font-size:24px;font-weight:800;margin-bottom:8px}
    .login-card p{color:#64748b;font-size:14px;margin-bottom:24px}
    .login-card input{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;transition:.2s}
    .login-card input:focus{border-color:#006a6a}
    .login-card button{width:100%;padding:14px;background:#006a6a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;transition:.2s}
    .login-card button:hover{background:#004f4f}
    .login-err{color:#ef4444;font-size:13px;margin-top:12px;display:none}
    .login-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px;color:#006a6a}
    .login-logo span{font-size:36px}
    
    /* Layout */
    .admin-wrap{display:flex;min-height:100vh}
    .sidebar{width:260px;background:#0f172a;color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:.3s}
    .sidebar-logo{padding:20px 24px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:10px}
    .sidebar-logo span.material-symbols-outlined{color:#2dd4bf;font-size:28px}
    .sidebar-logo h3{font-size:16px;font-weight:700}
    .sidebar-logo small{font-size:11px;color:#64748b;display:block;margin-top:2px}
    .sidebar nav{flex:1;padding:16px 12px;overflow-y:auto}
    .nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#475569;padding:16px 12px 8px;margin-top:8px}
    .nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 16px;border:none;background:transparent;color:#94a3b8;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;text-align:left;transition:.15s}
    .nav-btn:hover{background:#1e293b;color:#e2e8f0}
    .nav-btn.active{background:#006a6a;color:#fff}
    .nav-btn .material-symbols-outlined{font-size:20px}
    .sidebar-footer{padding:16px;border-top:1px solid #1e293b}
    .sidebar-footer a{display:flex;align-items:center;gap:8px;color:#64748b;font-size:13px;text-decoration:none;transition:.15s}
    .sidebar-footer a:hover{color:#fff}
    
    /* Main */
    .main-content{flex:1;margin-left:260px;min-height:100vh}
    .topbar{background:#fff;padding:16px 32px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
    .topbar h1{font-size:20px;font-weight:700}
    .topbar-actions{display:flex;align-items:center;gap:12px}
    .page-content{padding:32px}
    
    /* Cards & Tables */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px}
    .stat-card{background:#fff;padding:24px;border-radius:12px;border:1px solid #e2e8f0}
    .stat-card .stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
    .stat-card h4{font-size:28px;font-weight:800;margin-bottom:4px}
    .stat-card p{font-size:13px;color:#64748b;font-weight:500}
    
    .data-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
    .data-card-header{padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
    .data-card-header h3{font-size:16px;font-weight:700}
    
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
    .btn-primary{background:#006a6a;color:#fff}.btn-primary:hover{background:#004f4f}
    .btn-sm{padding:7px 14px;font-size:13px;border-radius:6px}
    .btn-ghost{background:transparent;color:#64748b;border:1px solid #e2e8f0}.btn-ghost:hover{background:#f1f5f9}
    .btn-danger{background:#fef2f2;color:#ef4444}.btn-danger:hover{background:#fee2e2}
    
    table{width:100%;border-collapse:collapse}
    thead th{padding:12px 20px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0}
    tbody td{padding:14px 20px;border-bottom:1px solid #f1f5f9;font-size:14px;vertical-align:middle}
    tbody tr:hover{background:#f8fafc}
    .table-img{width:48px;height:64px;object-fit:cover;border-radius:6px;background:#f1f5f9}
    .table-thumb{width:72px;height:56px;object-fit:cover;border-radius:6px;background:#f1f5f9}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#f0fdfa;color:#006a6a}
    
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:720px;box-shadow:0 25px 60px rgba(0,0,0,.25);margin:auto}
    .modal-header{padding:20px 28px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
    .modal-header h3{font-size:18px;font-weight:700}
    .modal-body{padding:28px;max-height:60vh;overflow-y:auto}
    .modal-footer{padding:16px 28px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 16px 16px}
    
    /* Form */
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
    .form-group input:focus,.form-group textarea:focus{border-color:#006a6a}
    .form-group textarea{min-height:100px;resize:vertical}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-hint{font-size:12px;color:#94a3b8;margin-top:4px}
    .form-section{font-size:15px;font-weight:700;color:#006a6a;border-bottom:2px solid #f0fdfa;padding-bottom:8px;margin:24px 0 16px}
    
    /* Image Upload */
    .img-upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.2s;position:relative;background:#fafbfc}
    .img-upload-zone:hover{border-color:#006a6a;background:#f0fdfa}
    .img-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .img-upload-zone .material-symbols-outlined{font-size:32px;color:#94a3b8;margin-bottom:8px}
    .img-upload-zone p{font-size:13px;color:#64748b}
    .img-upload-zone small{font-size:11px;color:#94a3b8}
    .img-preview{max-width:120px;max-height:120px;border-radius:8px;margin-top:10px;object-fit:cover;border:2px solid #e2e8f0}
    
    /* Progress */
    .progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:8px;display:none}
    .progress-bar .fill{height:100%;background:#006a6a;border-radius:3px;transition:width .3s}
    
    /* Toast */
    .toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.2);transform:translateY(20px);opacity:0;transition:.3s;max-width:400px}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:#006a6a}
    .toast.error{background:#ef4444}
    .toast .material-symbols-outlined{font-size:20px}
    
    /* Empty state */
    .empty-state{text-align:center;padding:60px 20px;color:#94a3b8}
    .empty-state .material-symbols-outlined{font-size:56px;margin-bottom:12px;display:block}
    .empty-state p{font-size:15px;font-weight:500}
    
    /* Responsive */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .main-content{margin-left:0}
      .form-row{grid-template-columns:1fr}
      .stat-grid{grid-template-columns:1fr 1fr}
    }
    
    .hidden{display:none!important}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="material-symbols-outlined">auto_stories</span>
      <div><strong style="font-size:18px">Library Admin</strong></div>
    </div>
    <h2>Welcome Back</h2>
    <p>Enter your admin password to continue</p>
    <input type="password" id="admin-pwd" placeholder="Enter password" autofocus>
    <button id="login-btn">Sign In</button>
    <p class="login-err" id="login-err">Incorrect password. Try again.</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="admin-wrap hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="material-symbols-outlined">auto_stories</span>
      <div>
        <h3>Library CMS</h3>
        <small>WordPress-Style Panel</small>
      </div>
    </div>
    <nav>
      <div class="nav-section">Main</div>
      <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
        <span class="material-symbols-outlined">dashboard</span> Dashboard
      </button>
      <div class="nav-section">Content</div>
      <button class="nav-btn" data-tab="books" onclick="switchTab('books')">
        <span class="material-symbols-outlined">menu_book</span> Books
      </button>
      <button class="nav-btn" data-tab="categories" onclick="switchTab('categories')">
        <span class="material-symbols-outlined">category</span> Categories
      </button>
      <button class="nav-btn" data-tab="gallery" onclick="switchTab('gallery')">
        <span class="material-symbols-outlined">collections</span> Gallery
      </button>
      <div class="nav-section">Website</div>
      <button class="nav-btn" data-tab="pages" onclick="switchTab('pages')">
        <span class="material-symbols-outlined">article</span> Pages
      </button>
      <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">
        <span class="material-symbols-outlined">settings</span> Settings
      </button>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank"><span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> View Live Site</a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-actions">
        <button id="add-new-btn" class="btn btn-primary hidden" onclick="openAddForm()">
          <span class="material-symbols-outlined" style="font-size:18px">add</span> Add New
        </button>
      </div>
    </div>
    <div class="page-content">
      <div id="tab-content"><!-- Dynamic content --></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add New</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" style="padding:6px"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-body" id="modal-body">
      <form id="data-form"></form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveData()">
        <span class="material-symbols-outlined" style="font-size:16px">save</span> Save Changes
      </button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="assets/js/admin.js"></script>
</body>
</html>
