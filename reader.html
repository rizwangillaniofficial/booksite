<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader - Syed Ejaz Digital Library</title>
  <meta name="description" content="Read books online from the Syed Ejaz Digital Library">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-dim": "#d9dadb", "primary-container": "#5d5f61",
        "tertiary-fixed": "#dee1ff", "tertiary": "#0132c5", "error": "#ba1a1a",
        "surface-container": "#edeeef", "primary": "#454749",
        "on-secondary-container": "#0b6e6e", "on-primary-container": "#d9d9db",
        "surface-container-lowest": "#ffffff", "on-error": "#ffffff",
        "inverse-on-surface": "#f0f1f2", "secondary-fixed": "#a0f0f0",
        "background": "#f8f9fa", "surface-tint": "#5d5e61", "surface": "#f8f9fa",
        "secondary-fixed-dim": "#84d4d3", "on-secondary-fixed": "#002020",
        "inverse-primary": "#c6c6c9", "primary-fixed-dim": "#c6c6c9",
        "surface-container-highest": "#e1e3e4", "surface-bright": "#f8f9fa",
        "secondary-container": "#9deeed", "surface-container-low": "#f3f4f5",
        "on-tertiary-fixed-variant": "#0031c4", "outline": "#6e7979",
        "inverse-surface": "#2e3132", "surface-variant": "#e1e3e4",
        "outline-variant": "#bec9c8", "on-error-container": "#93000a",
        "on-primary-fixed": "#1a1c1e", "on-secondary-fixed-variant": "#004f4f",
        "error-container": "#ffdad6", "secondary": "#006a6a",
        "primary-fixed": "#e2e2e5", "on-surface": "#191c1d",
        "on-secondary": "#ffffff", "on-primary-fixed-variant": "#454749",
        "on-tertiary-fixed": "#001159", "on-tertiary-container": "#d2d7ff",
        "on-surface-variant": "#3e4948", "on-primary": "#ffffff",
        "surface-container-high": "#e7e8e9", "on-tertiary": "#ffffff",
        "on-background": "#191c1d", "tertiary-fixed-dim": "#bac3ff",
        "tertiary-container": "#2f4fdd"
      },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      fontFamily: { headline: ["Manrope"], body: ["Inter"], label: ["Inter"] }
    }
  }
}</script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light');}</script>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
  <div id="nav-container"></div>
<main class="pt-24 pb-16">
  <div id="reader-container" class="max-w-5xl mx-auto px-8">
    <!-- Book Info Header -->
    <div id="reader-header" class="mb-8">
      <a href="books.html" class="inline-flex items-center gap-2 text-primary hover:text-secondary transition-colors font-headline font-semibold mb-6">
        <span class="material-symbols-outlined">arrow_back</span>
        <span>Back to Books</span>
      </a>
      <div id="book-info" class="flex flex-col md:flex-row gap-8 bg-surface-container-low rounded-xl p-8">
        <div class="w-48 h-72 rounded-lg overflow-hidden bg-gray-50 flex-shrink-0 shadow-lg">
          <img id="book-cover" src="" alt="" class="w-full h-full object-contain">
        </div>
        <div class="flex flex-col justify-center">
          <span id="book-category" class="text-xs font-bold uppercase tracking-widest text-[#006a6a] mb-2"></span>
          <h1 id="book-title" class="font-headline text-3xl font-extrabold text-on-surface mb-2"></h1>
          <p id="book-title-ur" class="urdu-text text-lg text-slate-500 mb-3"></p>
          <p id="book-author" class="text-primary mb-4"></p>
          <p id="book-description" class="text-slate-500 text-sm leading-relaxed max-w-xl"></p>
          <div class="flex gap-3 mt-6">
            <span id="book-year" class="px-3 py-1 bg-surface-container-high rounded-full text-xs font-semibold text-primary"></span>
            <span id="book-lang" class="px-3 py-1 bg-surface-container-high rounded-full text-xs font-semibold text-primary"></span>
          </div>
        </div>
      </div>
    </div>
    <!-- Reader Area -->
    <div id="reader-area" class="bg-surface-container-lowest rounded-xl shadow-lg p-8 md:p-12 min-h-[600px]">
      <div id="reader-loading" class="flex flex-col items-center justify-center h-96 text-slate-400">
        <span class="material-symbols-outlined text-6xl mb-4">auto_stories</span>
        <p class="font-headline font-bold text-lg">Select a book to start reading</p>
        <p class="text-sm mt-2">Choose from our <a href="books.html" class="text-[#006a6a] hover:underline">book collection</a></p>
      </div>
      <div id="pdf-viewer" class="hidden w-full">
        <iframe id="pdf-frame" class="w-full h-[800px] rounded-lg" src="" frameborder="0"></iframe>
      </div>
    </div>
  </div>
</main>
  <div id="footer-container"></div>
  <script src="assets/js/nav-footer.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/reader.js"></script>
</body>
</html>
